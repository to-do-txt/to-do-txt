<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>to-do-txt v4.2.1-offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
    <style>
        :root { --bg-app: #121212; --bg-card: #1e1e1e; --bg-input: #0a0a0a; --text-main: #e5e7eb; --text-muted: #9ca3af; --border: #333; }
        body { background-color: var(--bg-app); color: var(--text-main); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        /* ... existing styles ... */
    </style>
</head>
<body class="font-sans">

    <script>
        // --- OFFLINE SERVICE WORKER (PWA) ---
        const swCode = `
            const CACHE_NAME = 'todo-txt-v4.2.1';
            self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll([location.href]))); });
            self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // --- SYNC QUEUE LOGIC ---
        window.addEventListener('online', syncOfflineQueue);
        window.addEventListener('offline', () => { if (syncMode === 'dropbox') setStatus("Offline Mode Active", false, 'bg-yellow-500'); });

        async function syncOfflineQueue() {
            const queuedTasks = localStorage.getItem('offline_queue_tasks');
            const queuedFile = localStorage.getItem('offline_queue_file');
            if (queuedTasks && queuedFile && navigator.onLine && syncMode === 'dropbox') {
                setStatus("Pushing offline changes...", true);
                try {
                    const contents = JSON.parse(queuedTasks).join('\n');
                    await dbx.filesUpload({ path: queuedFile, contents: contents, mode: {".tag":"overwrite"} });
                    localStorage.removeItem('offline_queue_tasks');
                    localStorage.removeItem('offline_queue_file');
                    setStatus(`Synced ${new Date().toLocaleTimeString([], {hour12:false})}`);
                    if (queuedFile === currentFile) await loadTasksDropbox();
                } catch(e) { setStatus("Error syncing queue", false, 'bg-red-500'); }
            }
        }

        async function saveTasksDropbox() {
            if (!dbx) return;
            if (!navigator.onLine) {
                localStorage.setItem('offline_queue_file', currentFile);
                localStorage.setItem('offline_queue_tasks', JSON.stringify(allTasks));
                setStatus("Saved Locally (Offline)", false, 'bg-yellow-500');
                return; 
            }
            // ... original online save logic ...
        }

        async function init() {
            // ... existing init logic ...
            await syncOfflineQueue(); // Run on startup
            // ...
        }
        // ... rest of your code ...
    </script>
</body>
</html>
